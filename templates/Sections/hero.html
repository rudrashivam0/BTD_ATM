    <div class="hero-visual">

      <!-- FLOATING CARD 1 -->
      <div class="glass-card card-1">
        <h4>98%</h4>
        <span>Pattern Sensitivity</span>
      </div>

      <!-- FLOATING CARD 2 -->
      <div class="glass-card card-2">
        <h4>4-Class</h4>
        <span>Tumor Classification</span>
      </div>

      <!-- FLOATING CARD 3 -->
      <div class="glass-card card-3">
        <h4>AI-Assisted</h4>
        <span>MRI Analysis</span>
      </div>

      <!-- MAIN IMAGE -->
      <img

        src="https://cdn.prod.website-files.com/6356ba441271195b07290d97/6391f6401e0662850b1f0c81_hero-first-frame.webp"
        alt="Neural Brain Visualization"

  <!-- SCROLL INDICATOR -->

<!-- ===================== STYLES ===================== -->
<style>
/* ===== GLOBAL SAFETY ===== */
*,
*::before,
*::after {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 0%;
  background: #f8fafc;
  overflow-x: hidden;
}

/* ===== HERO SECTION ===== */
.biotech-hero {
  min-height: 100vh;
  display: flex;
  padding: 4rem 0 4rem 4rem; ;
  /* align-items: center; */
  /* padding: clamp(100px, 8vw, 140px) 6vw; */
  background:
    radial-gradient(circle at 20% 10%, #eef2ff, transparent 60%),
    radial-gradient(circle at 90% 40%, #ecfeff, transparent 55%),
    #f8fafc;
}

/* ===== CONTENT GRID ===== */
.hero-content {
  width: 100%;
  max-width: 1300px;
  margin: auto;
  display: grid;
  grid-template-columns: 1fr 1.3fr;
  align-items: center;
  gap: clamp(40px, 6vw, 90px);
}

/* ===== TEXT ===== */
.hero-text {
  max-width: 560px;
}

.hero-tag {
  display: inline-block;
  margin-bottom: 16px;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: #64748b;
}

.hero-text h1 {
  font-size: clamp(2.8rem, 5vw, 4.4rem);
  font-weight: 900;
  line-height: 1.05;
  margin: 0 0 24px;
  color: #020617;
}

.hero-text h1 span {
  background: linear-gradient(90deg, #2563eb, #38bdf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero-text p {
  font-size: 1.1rem;
  line-height: 1.8;
  color: #475569;
}

/* ===== RIGHT VISUAL ===== */
.hero-visual {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* MAIN IMAGE */
.hero-image {
  width: 200%;
  max-width: 700px;
  border-radius: 30px;

  filter:
    drop-shadow(0 50px 90px rgba(37,99,235,0.35))
    drop-shadow(0 30px 70px rgba(56,189,248,0.25))
    drop-shadow(0 -20px 60px rgba(168,85,247,0.2));

  animation: float-main 12s ease-in-out infinite;
  transform-style: preserve-3d;
}

/* ===== GLASS CARDS ===== */
.glass-card {
  position: absolute;
  padding: 18px 22px;
  border-radius: 20px;
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(14px);
  text-align: center;

  filter:
    drop-shadow(0 20px 40px rgba(2,6,23,0.25))
    drop-shadow(0 0 30px rgba(99,102,241,0.2));

  animation: float-card 8s ease-in-out infinite;
}

.glass-card h4 {
  margin: 0;
  font-size: 1.4rem;
  font-weight: 800;
  color: #020617;
}

.glass-card span {
  font-size: 0.85rem;
  color: #475569;
}

/* CARD POSITIONS */
.card-1 {
  top: 10%;
  left: 0;
}

.card-2 {
  bottom: 12%;
  right: 0;
  animation-delay: 1.5s;
}

.card-3 {
  top: 55%;
  left: -40px;
  animation-delay: 3s;
}

/* ===== ANIMATIONS ===== */
@keyframes float-main {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-14px); }
}

@keyframes float-card {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 1024px) {
  .hero-content {
    grid-template-columns: 1fr;
    text-align: center;
  }

  .hero-text {
    margin: auto;
  }

  .hero-visual {
    margin-top: 60px;
  }

  .card-1,
  .card-2,
  .card-3 {
    display: none;
  }
}

@media (max-width: 640px) {
  .hero-text h1 {
    font-size: 2.4rem;
  }

  .hero-image {
    max-width: 360px;
  }
}



/* ===== SCROLL DOWN INDICATOR ===== */
.scroll-indicator {
  position: absolute;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  width: 28px;
  height: 46px;
  border: 2px solid rgba(15, 23, 42, 0.35);
  border-radius: 20px;
  display: flex;
  justify-content: center;
  padding-top: 8px;
  pointer-events: none;
}

.scroll-indicator span {
  width: 6px;
  height: 6px;
  background: linear-gradient(180deg, #2563eb, #38bdf8);
  border-radius: 50%;
  animation: scroll-down 2s infinite ease-in-out;
  box-shadow:
    0 0 10px rgba(56,189,248,0.6),
    0 0 20px rgba(37,99,235,0.4);
}

/* ANIMATION */
@keyframes scroll-down {
  0% {
    transform: translateY(0);
    opacity: 0;
  }
  30% {
    opacity: 1;
  }
  60% {
    transform: translateY(14px);
    opacity: 1;
  }
  100% {
    transform: translateY(20px);
    opacity: 0;
  }
}

/* MOBILE SAFETY */
@media (max-width: 768px) {
  .scroll-indicator {
    bottom: 20px;
    transform: translateX(-50%) scale(0.9);
  }
}

</style>
